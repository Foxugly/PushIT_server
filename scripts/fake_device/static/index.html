<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PushIT Fake Device</title>
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
  crossorigin="anonymous" />
<style>
  body { background-color: #f8f9fa; }
  .status.ok { color: #0f5132; }
  .status.err { color: #b02a37; }
  .status.warn { color: #997404; }
  #fcm-token { display: block; word-break: break-all; }
  .notif-item { border-left: 4px solid #0d6efd; }
  .notif-item.background { border-left-color: #fd7e14; }
  .notif-item .ts { color: #6c757d; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="container py-4" style="max-width: 860px;">
  <header class="mb-4">
    <h1 class="h3 mb-1">PushIT Fake Device</h1>
    <p class="text-muted mb-0">Browser-based FCM receiver for end-to-end testing without a smartphone.</p>
  </header>

  <div class="card mb-3 shadow-sm">
    <div class="card-header fw-semibold">1. User login</div>
    <div class="card-body">
      <div class="row g-2 mb-2">
        <div class="col-md-5">
          <input id="email" type="email" class="form-control" placeholder="email@example.com" autocomplete="username" />
        </div>
        <div class="col-md-5">
          <input id="password" type="password" class="form-control" placeholder="Password" autocomplete="current-password" />
        </div>
        <div class="col-md-2 d-grid">
          <button id="login-btn" class="btn btn-outline-primary">Login</button>
        </div>
      </div>
      <p id="login-status" class="status small mb-0"></p>
    </div>
  </div>

  <div class="card mb-3 shadow-sm">
    <div class="card-header fw-semibold">2. App token</div>
    <div class="card-body">
      <div class="input-group mb-2">
        <input id="app-token" type="text" class="form-control font-monospace" placeholder="apt_..." />
        <button id="register-btn" class="btn btn-primary">Register device</button>
      </div>
      <p id="register-status" class="status small mb-0"></p>
    </div>
  </div>

  <div class="card mb-3 shadow-sm">
    <div class="card-header fw-semibold">3. FCM token</div>
    <div class="card-body">
      <p id="token-status" class="status small">Waiting for notification permission...</p>
      <div class="input-group">
        <code id="fcm-token" class="form-control bg-light font-monospace small">-</code>
        <button id="copy-token-btn" class="btn btn-outline-secondary" disabled>Copy</button>
      </div>
    </div>
  </div>

  <div class="card mb-3 shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
      <span>4. Received notifications</span>
      <span id="received-count" class="badge text-bg-secondary">0 received</span>
    </div>
    <div class="card-body">
      <button id="clear-btn" class="btn btn-sm btn-outline-danger mb-3">Clear</button>
      <ul id="received-list" class="list-group"></ul>
    </div>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
