name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          STATE: TEST
          SECRET_KEY: test-secret-key
          MEDIA_ROOT_DIR: media
        run: pytest -q -m "not integration"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write    # mint the OIDC token to assume the deploy role
      contents: read

    steps:
      # Deploy is OIDC -> SSM (no long-lived SSH key). AWS-RunShellScript runs as
      # root and invokes deploy.sh as django (git reset, pip, migrate,
      # collectstatic, perms, restart via the pushit-deploy sudoers grant) — same
      # work as the old SSH deploy. Secrets stay in SSM (/pushit/prod/*), fetched
      # to /run/pushit/.env at boot by pushit-env-fetch and sourced by deploy.sh.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-params.json <<'EOF'
          { "commands": [
            "sudo -u django bash -c 'umask 027; cd /var/www/django_websites/PushIT_server && git fetch --quiet origin main && git reset --hard --quiet origin/main'",
            "sudo -u django bash /var/www/django_websites/PushIT_server/deploy/deploy.sh"
          ], "executionTimeout": ["900"] }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy pushit ${{ github.sha }}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                echo "::group::stderr"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                echo "::endgroup::"
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out waiting for SSM command after 15 minutes"
          exit 1
