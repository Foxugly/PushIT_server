name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          STATE: TEST
          DJANGO_SECRET_KEY: test-secret-key
          MEDIA_ROOT_DIR: media
        run: pytest -q -m "not integration"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      # Env vars are NOT injected here. The source of truth is AWS SSM
      # (/pushit/prod/*), fetched into /run/pushit/.env at boot by
      # pushit-env-fetch.service and sourced by deploy.sh. To change a value,
      # seed SSM (deploy/seed-parameter-store.{sh,ps1}) and restart
      # pushit-env-fetch — see CLAUDE.md. (The old DOTENV_PROD secret is unused.)
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo -u django /var/www/django_websites/PushIT_server/deploy/deploy.sh
