name: Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          STATE: TEST
          DJANGO_SECRET_KEY: test-secret-key
          MEDIA_ROOT_DIR: media
        run: pytest -q -m "not integration"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOTENV_PROD
          script: |
            sudo -u django bash -c 'echo "$0" > /var/www/django_websites/PushIT_server/.env' "$DOTENV_PROD"
            sudo chmod 600 /var/www/django_websites/PushIT_server/.env
            sudo chown django:www-data /var/www/django_websites/PushIT_server/.env
            sudo -u django /var/www/django_websites/PushIT_server/deploy/deploy.sh
        env:
          DOTENV_PROD: ${{ secrets.DOTENV_PROD }}
