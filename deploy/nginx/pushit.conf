upstream pushit {
    server unix:/run/pushit/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name pushit.foxugly.com;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /static/ {
        alias /opt/pushit/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/pushit/mediafiles/;
        expires 7d;
    }

    location / {
        proxy_pass http://pushit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# After running certbot --nginx -d pushit.foxugly.com, certbot will:
# - Add a server block listening on 443 with SSL
# - Add a redirect from 80 to 443
# - Manage certificate renewal automatically via systemd timer
