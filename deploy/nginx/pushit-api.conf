# PushIT API — nginx reverse proxy to Gunicorn (127.0.0.1:8001).
# Certbot (`certbot --nginx -d pushit-api.foxugly.com`) adds the 443 server
# block and the HTTP->HTTPS redirect on top of this.
#
# Installed to /etc/nginx/sites-available/pushit-api.conf and symlinked into
# sites-enabled by deploy/setup-server.sh.

server {
    listen 80;
    server_name pushit-api.foxugly.com;

    client_max_body_size 25m;

    # --- Compression (dynamic) ---
    # API serves mostly JSON + Django static (CSS/JS/SVG). Compress text-like
    # types only; never images / woff2 / video (already compressed). text/html
    # is always included by nginx implicitly. Does not touch cache/security.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/rss+xml application/manifest+json
        image/svg+xml application/x-font-ttf font/otf application/vnd.ms-fontobject;

    # brotli requires the ngx_brotli module (apt: libnginx-mod-http-brotli).
    # comp_level 5 is the sweet spot for on-the-fly responses (11 is for
    # build-time pre-compressed static assets, handled on the frontend).
    brotli on;
    brotli_comp_level 5;
    brotli_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/rss+xml application/manifest+json
        image/svg+xml application/x-font-ttf font/otf application/vnd.ms-fontobject;

    location /static/ {
        alias /var/www/django_websites/PushIT_server/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/django_websites/PushIT_server/media/;
        access_log off;
        expires 30d;
    }

    location / {
        # Upstream is the Gunicorn TCP bind from deploy/gunicorn.conf.py.
        # Keep this in sync with `bind` there — socket/port mismatch => 502.
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    access_log /var/log/nginx/pushit-access.log;
    error_log  /var/log/nginx/pushit-error.log;
}
