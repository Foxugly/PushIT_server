<VirtualHost *:80>
    ServerName pushit-api.foxugly.com

    # Certbot will add the redirect to 443 automatically.
    # Until then, serve the app on port 80.

    Alias /static/ /var/www/django_websites/PushIT_server/staticfiles/
    <Directory /var/www/django_websites/PushIT_server/staticfiles/>
        Require all granted
    </Directory>

    Alias /media/ /var/www/django_websites/PushIT_server/media/
    <Directory /var/www/django_websites/PushIT_server/media/>
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /static/ !
    ProxyPass /media/ !
    ProxyPass / unix:/run/pushit/gunicorn.sock|http://localhost/
    ProxyPassReverse / unix:/run/pushit/gunicorn.sock|http://localhost/

    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog ${APACHE_LOG_DIR}/pushit-error.log
    CustomLog ${APACHE_LOG_DIR}/pushit-access.log combined
</VirtualHost>
