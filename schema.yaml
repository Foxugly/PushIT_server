        authenticated user. The listing can be filtered by application, status, effective
        date, and quiet period shift presence.
      summary: List notifications
      parameters:
      - in: query
        name: application_id
        schema:
          type: integer
        description: Filter by application.
      - in: query
        name: effective_scheduled_from
        schema:
          type: string
          format: date-time
        description: Inclusive filter on minimum effective send date.
      - in: query
        name: effective_scheduled_to
        schema:
          type: string
          format: date-time
        description: Inclusive filter on maximum effective send date.
      - in: query
        name: has_quiet_period_shift
        schema:
          type: boolean
        description: Only return notifications whose effective date is shifted by
          a quiet period.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -effective_scheduled_for
          - effective_scheduled_for
        description: Optional ordering by effective send date.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - draft
          - failed
          - no_target
          - partial
          - processing
          - queued
          - scheduled
          - sent
        description: Filter by notification status.
