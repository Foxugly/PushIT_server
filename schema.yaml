  /api/v1/notifications/:
    get:
      operationId: api_v1_notifications_list
      description: Returns the list of notifications for applications owned by the
        authenticated user. The listing can be filtered by application, status, effective
        date, and quiet period shift presence.
      summary: List notifications
      parameters:
      - in: query
        name: application_id
        schema:
          type: integer
        description: Filter by application.
      - in: query
        name: effective_scheduled_from
        schema:
          type: string
          format: date-time
        description: Inclusive filter on minimum effective send date.
      - in: query
        name: effective_scheduled_to
        schema:
          type: string
          format: date-time
        description: Inclusive filter on maximum effective send date.
      - in: query
        name: has_quiet_period_shift
        schema:
          type: boolean
        description: Only return notifications whose effective date is shifted by
          a quiet period.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -effective_scheduled_for
          - effective_scheduled_for
        description: Optional ordering by effective send date.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - draft
          - failed
          - no_target
          - partial
          - processing
          - queued
          - scheduled
          - sent
        description: Filter by notification status.
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationReadList'
              examples:
                ShiftedScheduledNotificationsForOneApplication:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening reminder
                        message: Opens at 8pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T22:30:00Z'
                        effective_scheduled_for: '2026-03-28T08:00:00Z'
                        sent_at: null
                  summary: Shifted scheduled notifications for one application
                NotificationsOrderedByEffectiveScheduleDesc:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 43
                        application_id: 12
                        application_name: Demo Push App
                        title: Late announcement
                        message: Sending at 11pm.
                        status: scheduled
                        created_at: '2026-03-27T10:05:00Z'
                        scheduled_for: '2026-03-27T23:00:00Z'
                        effective_scheduled_for: '2026-03-28T09:00:00Z'
                        sent_at: null
                      - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening reminder
                        message: Opens at 8pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T22:30:00Z'
                        effective_scheduled_for: '2026-03-28T08:00:00Z'
                        sent_at: null
                  summary: Notifications ordered by effective schedule desc
          description: List of notifications
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListFilterValidationErrorResponse'
          description: Invalid filters
    post:
      operationId: api_v1_notifications_create
      description: Creates a new notification for an application owned by the authenticated
        user and an explicit list of target devices. If `scheduled_for` is provided,
        the notification is created with `scheduled` status and will be dispatched
        automatically later. `scheduled_for` represents the requested date. `effective_scheduled_for`
        represents the effective send date computed from currently configured quiet
        periods.
      summary: Create a notification
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
