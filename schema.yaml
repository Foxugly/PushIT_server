          type: string
          format: date-time
        description: Filtre inclusif sur la date effective minimale d'envoi.
      - in: query
        name: effective_scheduled_to
        schema:
          type: string
          format: date-time
        description: Filtre inclusif sur la date effective maximale d'envoi.
      - in: query
        name: has_quiet_period_shift
        schema:
          type: boolean
        description: Ne retourne que les notifications dont la date effective est
          decalee par une periode blanche.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -effective_scheduled_for
          - effective_scheduled_for
        description: Tri optionnel par date effective d'envoi.
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationRead'
              examples:
                FutureNotificationsShiftedByQuietPeriod:
                  value:
                  - - id: 42
                      application_id: 12
                      application_name: Demo Push App
                      title: Rappel ce soir
                      message: Ouverture a 20h.
                      status: scheduled
                      created_at: '2026-03-27T10:00:00Z'
                      scheduled_for: '2026-03-27T22:30:00Z'
                      effective_scheduled_for: '2026-03-28T08:00:00Z'
                      sent_at: null
                  summary: Future notifications shifted by quiet period
                FutureNotificationsOrderedByEffectiveScheduleDesc:
                  value:
                  - - id: 43
                      application_id: 12
                      application_name: Demo Push App
                      title: Annonce tardive
                      message: Envoi a 23h.
                      status: scheduled
                      created_at: '2026-03-27T10:05:00Z'
                      scheduled_for: '2026-03-27T23:00:00Z'
                      effective_scheduled_for: '2026-03-28T09:00:00Z'
                      sent_at: null
                    - id: 42
                      application_id: 12
                      application_name: Demo Push App
                      title: Rappel ce soir
                      message: Ouverture a 20h.
                      status: scheduled
                      created_at: '2026-03-27T10:00:00Z'
                      scheduled_for: '2026-03-27T22:30:00Z'
                      effective_scheduled_for: '2026-03-28T08:00:00Z'
                      sent_at: null
                  summary: Future notifications ordered by effective schedule desc
          description: Liste des notifications futures
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationFutureFilterValidationErrorResponse'
              examples:
                InvalidEffectiveRange:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      effective_scheduled_to:
                      - La borne de fin doit etre apres ou egale a la borne de debut.
                  summary: Invalid effective range
          description: Filtres invalides
  /api/v1/notifications/future/{id}/:
    get:
      operationId: api_v1_notifications_future_retrieve
      description: Retourne une notification planifiee encore modifiable. `scheduled_for`
        represente la date demandee par l'utilisateur. `effective_scheduled_for` represente
        la date effective d'envoi calculee a partir des periodes blanches courantes.
      summary: Detail d'une notification future
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
              examples:
                FutureNotificationDeferredByQuietPeriod:
                  value:
                    id: 42
                    application_id: 12
                    application_name: Demo Push App
                    title: Rappel ce soir
                    message: Ouverture a 20h.
                    status: scheduled
                    created_at: '2026-03-27T10:00:00Z'
                    scheduled_for: '2026-03-27T22:30:00Z'
                    effective_scheduled_for: '2026-03-28T08:00:00Z'
                    sent_at: null
                  summary: Future notification deferred by quiet period
          description: Notification future
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Notification future introuvable
    patch:
      operationId: api_v1_notifications_future_partial_update
      description: Modifie le contenu ou la date d'envoi d'une notification planifiee.
        L'endpoint n'accepte que les notifications encore futures. Modifier une periode
        blanche ne reecrit pas retroactivement `scheduled_for`, mais la valeur de
        lecture `effective_scheduled_for` refletera la date effective tenant compte
        des periodes blanches actuelles.
      summary: Modifier une notification future
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
            examples:
              RescheduleFutureNotification:
                value:
                  title: Rappel repousse
                  scheduled_for: '2026-03-27T21:30:00+01:00'
                summary: Reschedule future notification
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationFutureUpdateValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      scheduled_for:
                      - La date planifiee doit etre dans le futur.
                  summary: Validation error
          description: Donnees invalides
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Notification future introuvable
    delete:
      operationId: api_v1_notifications_future_destroy
      description: Supprime une notification planifiee tant qu'elle n'a pas ete envoyee.
      summary: Supprimer une notification future
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Notification future introuvable
