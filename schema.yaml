      operationId: api_v1_notifications_bulk_send_create
      description: Queues multiple notifications for async sending. Returns queued
        IDs and per-notification errors.
      summary: Bulk queue notifications for sending
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSendRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkSendRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkSendRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Bulk send result with queued and errors
  /api/v1/notifications/future/:
    get:
      operationId: api_v1_notifications_future_list
      description: Returns only notifications with `scheduled` status whose `scheduled_for`
        is strictly in the future. These notifications can still be modified or deleted.
        `scheduled_for` represents the requested date, while `effective_scheduled_for`
        represents the next estimated dispatch date according to currently configured
        quiet periods.
      summary: List future notifications
      parameters:
      - in: query
        name: effective_scheduled_from
        schema:
          type: string
          format: date-time
        description: Inclusive filter on minimum effective send date.
      - in: query
        name: effective_scheduled_to
        schema:
          type: string
          format: date-time
        description: Inclusive filter on maximum effective send date.
      - in: query
        name: has_quiet_period_shift
        schema:
          type: boolean
        description: Only return notifications whose effective date is shifted by
          a quiet period.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -effective_scheduled_for
          - effective_scheduled_for
        description: Optional ordering by effective send date.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationReadList'
              examples:
                FutureNotificationsShiftedByQuietPeriod:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening reminder
                        message: Opens at 8pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T22:30:00Z'
                        effective_scheduled_for: '2026-03-28T08:00:00Z'
                        sent_at: null
                  summary: Future notifications shifted by quiet period
                FutureNotificationsOrderedByEffectiveScheduleDesc:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 43
                        application_id: 12
                        application_name: Demo Push App
                        title: Late announcement
                        message: Sending at 11pm.
                        status: scheduled
                        created_at: '2026-03-27T10:05:00Z'
                        scheduled_for: '2026-03-27T23:00:00Z'
                        effective_scheduled_for: '2026-03-28T09:00:00Z'
                        sent_at: null
                      - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening reminder
                        message: Opens at 8pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T22:30:00Z'
                        effective_scheduled_for: '2026-03-28T08:00:00Z'
                        sent_at: null
                  summary: Future notifications ordered by effective schedule desc
          description: List of future notifications
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationFutureFilterValidationErrorResponse'
              examples:
                InvalidEffectiveRange:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      effective_scheduled_to:
                      - End bound must be after or equal to the start bound.
                  summary: Invalid effective range
          description: Invalid filters
  /api/v1/notifications/future/{id}/:
    get:
      operationId: api_v1_notifications_future_retrieve
      description: Returns a scheduled notification that is still editable. `scheduled_for`
        represents the date requested by the user. `effective_scheduled_for` represents
        the effective send date computed from current quiet periods.
      summary: Future notification detail
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
              examples:
                FutureNotificationDeferredByQuietPeriod:
                  value:
                    id: 42
                    application_id: 12
                    application_name: Demo Push App
                    title: Evening reminder
                    message: Opens at 8pm.
                    status: scheduled
                    created_at: '2026-03-27T10:00:00Z'
                    scheduled_for: '2026-03-27T22:30:00Z'
                    effective_scheduled_for: '2026-03-28T08:00:00Z'
                    sent_at: null
                  summary: Future notification deferred by quiet period
          description: Future notification
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Future notification not found
    patch:
      operationId: api_v1_notifications_future_partial_update
      description: Updates the content or send date of a scheduled notification. The
        endpoint only accepts notifications that are still in the future. Modifying
        a quiet period does not retroactively rewrite `scheduled_for`, but the read
        value `effective_scheduled_for` will reflect the effective date accounting
        for current quiet periods.
      summary: Update a future notification
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
            examples:
              RescheduleFutureNotification:
                value:
                  title: Postponed reminder
                  scheduled_for: '2026-03-27T21:30:00+01:00'
                summary: Reschedule future notification
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNotificationFutureUpdate'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationFutureUpdateValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      scheduled_for:
                      - Scheduled date must be in the future.
                  summary: Validation error
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Future notification not found
    delete:
      operationId: api_v1_notifications_future_destroy
      description: Deletes a scheduled notification as long as it has not been sent.
      summary: Delete a future notification
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Future notification not found
  /api/v1/notifications/stats/:
    get:
      operationId: api_v1_notifications_stats_list
      description: Returns the notification count by status for applications owned
        by the authenticated user. Optionally filtered by application.
      summary: List notification statistics
      parameters:
      - in: query
        name: application_id
        schema:
          type: integer
        description: Filter statistics by application.
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationStats'
          description: ''
  /health/live/:
    get:
      operationId: health_live_retrieve
      description: Checks that the HTTP process is alive. Public endpoint used by
        infrastructure.
      summary: Liveness probe
      tags:
      - Health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                LivenessOK:
                  value:
                    status: ok
                    service: pushit
                    check: live
                  summary: Liveness OK
          description: Service alive
  /health/metrics/:
    get:
      operationId: health_metrics_retrieve
      description: Exposes Prometheus metrics. Can be protected via the `X-Metrics-Token`
        header.
      summary: Prometheus metrics
      parameters:
      - in: header
        name: X-Metrics-Token
        schema:
          type: string
        description: Optional token to protect access to `/health/metrics/`.
      tags:
      - Health
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
              examples:
                MetricsSample:
                  value: |-
                    # HELP pushit_process_uptime_seconds Process uptime in seconds
                    # TYPE pushit_process_uptime_seconds gauge
                    pushit_process_uptime_seconds 12.345
                  summary: Metrics sample
          description: Prometheus text payload
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthError'
              examples:
                MetricsForbidden:
                  value:
                    status: error
                    service: pushit
                    check: metrics
                    detail: metrics_token_invalid
                  summary: Metrics forbidden
          description: Invalid metrics token
  /health/ready/:
    get:
      operationId: health_ready_retrieve
      description: Checks that the service is ready to serve traffic, including database
        access.
      summary: Readiness probe
      tags:
      - Health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ReadinessOK:
                  value:
                    status: ok
                    service: pushit
                    check: ready
                  summary: Readiness OK
          description: Service ready
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthError'
              examples:
                DatabaseUnavailable:
                  value:
                    status: error
                    service: pushit
                    check: ready
                    detail: 'database_unavailable: database is locked'
                  summary: Database unavailable
          description: Dependency unavailable
