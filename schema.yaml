                $ref: '#/components/schemas/ErrorResponse'
          description: Send queue unavailable
  /api/v1/notifications/stats/:
    get:
      operationId: api_v1_notifications_stats_list
      description: Returns the notification count by status for applications owned
        by the authenticated user. Optionally filtered by application.
      summary: List notification statistics
      parameters:
      - in: query
        name: application_id
        schema:
          type: integer
        description: Filter statistics by application.
      tags:
      - Notifications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationStats'
          description: ''
  /health/live/:
    get:
      operationId: health_live_retrieve
      description: Checks that the HTTP process is alive. Public endpoint used by
        infrastructure.
      summary: Liveness probe
      tags:
      - Health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                LivenessOK:
                  value:
                    status: ok
                    service: pushit
                    check: live
                  summary: Liveness OK
          description: Service alive
  /health/metrics/:
    get:
      operationId: health_metrics_retrieve
      description: Exposes Prometheus metrics. Can be protected via the `X-Metrics-Token`
        header.
      summary: Prometheus metrics
      parameters:
      - in: header
        name: X-Metrics-Token
        schema:
          type: string
        description: Optional token to protect access to `/health/metrics/`.
      tags:
      - Health
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
              examples:
                MetricsSample:
                  value: |-
                    # HELP pushit_process_uptime_seconds Process uptime in seconds
                    # TYPE pushit_process_uptime_seconds gauge
                    pushit_process_uptime_seconds 12.345
                  summary: Metrics sample
          description: Prometheus text payload
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthError'
              examples:
                MetricsForbidden:
                  value:
                    status: error
                    service: pushit
                    check: metrics
                    detail: metrics_token_invalid
                  summary: Metrics forbidden
          description: Invalid metrics token
  /health/ready/:
    get:
      operationId: health_ready_retrieve
      description: Checks that the service is ready to serve traffic, including database
        access.
      summary: Readiness probe
      tags:
      - Health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ReadinessOK:
                  value:
                    status: ok
                    service: pushit
                    check: ready
                  summary: Readiness OK
          description: Service ready
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthError'
              examples:
                DatabaseUnavailable:
                  value:
                    status: error
                    service: pushit
                    check: ready
                    detail: 'database_unavailable: database is locked'
                  summary: Database unavailable
          description: Dependency unavailable
