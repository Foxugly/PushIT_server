openapi: 3.0.3
info:
  title: PushIT API
  version: 1.0.0
  description: Push notification API backend for Firebase Cloud Messaging
paths:
  /api/v1/apps/:
    get:
      operationId: api_v1_apps_list
      description: Returns the list of applications owned by the authenticated user.
      summary: List applications
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplicationReadList'
          description: ''
    post:
      operationId: api_v1_apps_create
      description: Creates a new application for the authenticated user.
      summary: Create an application
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCreateValidationErrorResponse'
          description: Invalid data
  /api/v1/apps/{app_id}/:
    get:
      operationId: api_v1_apps_retrieve
      description: Returns the detail of an application owned by the authenticated
        user.
      summary: Application detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    patch:
      operationId: api_v1_apps_partial_update
      description: Partially updates the name or description of an application.
      summary: Update an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdate'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationUpdateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    delete:
      operationId: api_v1_apps_destroy
      description: Deletes an application owned by the authenticated user.
      summary: Delete an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/activate/:
    post:
      operationId: api_v1_apps_activate_create
      description: Activates an application owned by the authenticated user.
      summary: Activate an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationActivationResponse'
          description: Application activated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/deactivate/:
    post:
      operationId: api_v1_apps_deactivate_create
      description: Deactivates an application owned by the authenticated user.
      summary: Deactivate an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationActivationResponse'
          description: Application deactivated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/qrcode/:
    post:
      operationId: api_v1_apps_qrcode_create
      description: Returns a PNG image of a QR code encoding the provided app token
        in plain text (e.g. `apt_xxxxxxxxxxxx`). The token must match the application's
        current token. Mobile clients scan this QR code to link their device to the
        application.
      summary: Generate QR code for an app token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            image/png:
              schema:
                type: string
                format: binary
          description: QR code PNG image
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/quiet-periods/:
    get:
      operationId: api_v1_apps_quiet_periods_list
      description: Returns the quiet periods configured for an application. A quiet
        period can be one-time (`period_type=ONCE`) with `start_at` / `end_at`, or
        recurring (`period_type=RECURRING`) with `recurrence_days`, `start_time` and
        `end_time`. Scheduled notifications are automatically deferred to the end
        of the active window, without retroactively rewriting `scheduled_for`.
      summary: List quiet periods
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplicationQuietPeriodReadList'
          description: ''
    post:
      operationId: api_v1_apps_quiet_periods_create
      description: Adds a one-time or recurring quiet period. If a notification is
        scheduled during this period, sending is deferred to the end of the active
        window. This does not retroactively rewrite `scheduled_for`, but the read
        value `effective_scheduled_for` of future notifications will reflect the current
        quiet periods.
      summary: Create a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWrite'
            examples:
              One-timeQuietPeriodRequest:
                value:
                  name: Marketing blackout
                  period_type: ONCE
                  start_at: '2026-03-27T22:00:00+01:00'
                  end_at: '2026-03-28T08:00:00+01:00'
                  recurrence_days: []
                  start_time: null
                  end_time: null
                  is_active: true
                summary: One-time quiet period request
              RecurringQuietPeriodRequest:
                value:
                  name: Weeknight quiet
                  period_type: RECURRING
                  start_at: null
                  end_at: null
                  recurrence_days:
                  - 0
                  - 1
                  - 2
                  - 3
                  - 4
                  start_time: '22:00:00'
                  end_time: 08:00:00
                  is_active: true
                summary: Recurring quiet period request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWrite'
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      end_at:
                      - Quiet period end must be after the start.
                  summary: Validation error
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/quiet-periods/{quiet_period_id}/:
    get:
      operationId: api_v1_apps_quiet_periods_retrieve
      description: Returns the detail of a quiet period.
      summary: Quiet period detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
    patch:
      operationId: api_v1_apps_quiet_periods_partial_update
      description: Updates an existing one-time or recurring quiet period.
      summary: Update a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWrite'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      end_at:
                      - Quiet period end must be after the start.
                  summary: Validation error
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
    delete:
      operationId: api_v1_apps_quiet_periods_destroy
      description: Deletes a quiet period.
      summary: Delete a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
  /api/v1/apps/{app_id}/regenerate-token/:
    post:
      operationId: api_v1_apps_regenerate_token_create
      description: Generates a new server token for an application owned by the authenticated
        user.
      summary: Regenerate application token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationTokenRegenerateResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/revoke-token/:
    post:
      operationId: api_v1_apps_revoke_token_create
      description: Revokes the current application token.
      summary: Revoke application token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRevokeTokenResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/templates/:
    get:
      operationId: api_v1_apps_templates_list
      description: Returns the notification templates for an application owned by
        the authenticated user.
      summary: List notification templates
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationTemplateReadList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    post:
      operationId: api_v1_apps_templates_create
      description: Creates a notification template for an application. Use `{{variable_name}}`
        placeholders in title_template and message_template. These will be replaced
        by the variables dict when creating a notification from the template.
      summary: Create a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWrite'
            examples:
              WelcomeTemplate:
                value:
                  name: welcome
                  title_template: Welcome {{username}}
                  message_template: Hello {{username}}, welcome to {{app_name}}!
                summary: Welcome template
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWrite'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/templates/{template_id}/:
    get:
      operationId: api_v1_apps_templates_retrieve
      description: Returns the detail of a notification template.
      summary: Notification template detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
    patch:
      operationId: api_v1_apps_templates_partial_update
      description: Updates an existing notification template.
      summary: Update a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWrite'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
    delete:
      operationId: api_v1_apps_templates_destroy
      description: Deletes a notification template.
      summary: Delete a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: Authenticates a user and returns JWT tokens.
      summary: User login
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginValidationErrorResponse'
          description: Invalid credentials or invalid data
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      description: Blacklists the current refresh token.
      summary: Logout
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutValidationErrorResponse'
          description: Invalid refresh token or invalid data
  /api/v1/auth/me/:
    get:
      operationId: api_v1_auth_me_retrieve
      description: Returns the currently authenticated user.
      summary: Current profile
      tags:
      - Accounts
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
    patch:
      operationId: api_v1_auth_me_partial_update
      description: Updates the preferred language of the authenticated user.
      summary: Update profile language
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserLanguageUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserLanguageUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserLanguageUpdate'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageUpdateValidationErrorResponse'
          description: Invalid data
  /api/v1/auth/refresh/:
    post:
      operationId: api_v1_auth_refresh_create
      description: Generates a new access token from a refresh token.
      summary: Refresh a token
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshValidationErrorResponse'
          description: Invalid refresh token or invalid data
  /api/v1/auth/register/:
    post:
      operationId: api_v1_auth_register_create
      description: Creates a new user account and returns the created profile.
      summary: Create an account
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterValidationErrorResponse'
          description: Invalid data
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Too many registration attempts
  /api/v1/devices/:
    get:
      operationId: api_v1_devices_list
      description: Returns the list of devices owned by the authenticated user.
      summary: List devices
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Devices
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeviceReadList'
          description: ''
  /api/v1/devices/{device_id}/quiet-periods/:
    get:
      operationId: api_v1_devices_quiet_periods_list
      description: Returns the quiet periods configured for a device. They can be
        one-time (`period_type=ONCE`) or recurring (`period_type=RECURRING`). They
        apply to deliveries for this device without blocking other devices.
      summary: List device quiet periods
      parameters:
      - in: path
        name: device_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Devices
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeviceQuietPeriodReadList'
          description: ''
    post:
      operationId: api_v1_devices_quiet_periods_create
      description: Adds a one-time or recurring quiet period on a device.
      summary: Create a device quiet period
      parameters:
      - in: path
        name: device_id
        schema:
