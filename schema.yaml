openapi: 3.0.3
info:
  title: PushIT API
  version: 1.0.0
  description: Push notification API backend for Firebase Cloud Messaging
paths:
  /api/v1/apps/:
    get:
      operationId: api_v1_apps_list
      description: Returns the list of applications owned by the authenticated user.
      summary: List applications
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplicationReadList'
          description: ''
    post:
      operationId: api_v1_apps_create
      description: Creates a new application for the authenticated user.
      summary: Create an application
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCreate'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCreateValidationErrorResponse'
          description: Invalid data
  /api/v1/apps/{app_id}/:
    get:
      operationId: api_v1_apps_retrieve
      description: Returns the detail of an application owned by the authenticated
        user.
      summary: Application detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    patch:
      operationId: api_v1_apps_partial_update
      description: Partially updates the name or description of an application.
      summary: Update an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationUpdateRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationUpdateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    delete:
      operationId: api_v1_apps_destroy
      description: Deletes an application owned by the authenticated user.
      summary: Delete an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/activate/:
    post:
      operationId: api_v1_apps_activate_create
      description: Activates an application owned by the authenticated user.
      summary: Activate an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationActivationResponse'
          description: Application activated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/deactivate/:
    post:
      operationId: api_v1_apps_deactivate_create
      description: Deactivates an application owned by the authenticated user.
      summary: Deactivate an application
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationActivationResponse'
          description: Application deactivated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/logo/:
    post:
      operationId: api_v1_apps_logo_create
      description: Sets the application's logo (multipart `logo` image). Returns the
        updated application.
      summary: Upload an application logo
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationLogoUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationLogoUploadRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    delete:
      operationId: api_v1_apps_logo_destroy
      summary: Remove an application logo
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/qrcode/:
    post:
      operationId: api_v1_apps_qrcode_create
      description: Returns a PNG image of a QR code encoding the provided app token
        in plain text (e.g. `apt_xxxxxxxxxxxx`). The token must match the application's
        current token. Mobile clients scan this QR code to link their device to the
        application.
      summary: Generate QR code for an app token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            image/png:
              schema:
                type: string
                format: binary
          description: QR code PNG image
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/quiet-periods/:
    get:
      operationId: api_v1_apps_quiet_periods_list
      description: Returns the quiet periods configured for an application. A quiet
        period can be one-time (`period_type=ONCE`) with `start_at` / `end_at`, or
        recurring (`period_type=RECURRING`) with `recurrence_days`, `start_time` and
        `end_time`. Scheduled notifications are automatically deferred to the end
        of the active window, without retroactively rewriting `scheduled_for`.
      summary: List quiet periods
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
    post:
      operationId: api_v1_apps_quiet_periods_create
      description: Adds a one-time or recurring quiet period. If a notification is
        scheduled during this period, sending is deferred to the end of the active
        window. This does not retroactively rewrite `scheduled_for`, but the read
        value `effective_scheduled_for` of future notifications will reflect the current
        quiet periods.
      summary: Create a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWriteRequest'
            examples:
              One-timeQuietPeriodRequest:
                value:
                  name: Marketing blackout
                  period_type: ONCE
                  start_at: '2026-03-27T22:00:00+01:00'
                  end_at: '2026-03-28T08:00:00+01:00'
                  recurrence_days: []
                  start_time: null
                  end_time: null
                  is_active: true
                summary: One-time quiet period request
              RecurringQuietPeriodRequest:
                value:
                  name: Weeknight quiet
                  period_type: RECURRING
                  start_at: null
                  end_at: null
                  recurrence_days:
                  - 0
                  - 1
                  - 2
                  - 3
                  - 4
                  start_time: '22:00:00'
                  end_time: 08:00:00
                  is_active: true
                summary: Recurring quiet period request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationQuietPeriodWriteRequest'
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      end_at:
                      - Quiet period end must be after the start.
                  summary: Validation error
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/quiet-periods/{quiet_period_id}/:
    get:
      operationId: api_v1_apps_quiet_periods_retrieve
      description: Returns the detail of a quiet period.
      summary: Quiet period detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
    patch:
      operationId: api_v1_apps_quiet_periods_partial_update
      description: Updates an existing one-time or recurring quiet period.
      summary: Update a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationQuietPeriodWriteRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationQuietPeriodValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      end_at:
                      - Quiet period end must be after the start.
                  summary: Validation error
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
    delete:
      operationId: api_v1_apps_quiet_periods_destroy
      description: Deletes a quiet period.
      summary: Delete a quiet period
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: quiet_period_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Quiet period not found
  /api/v1/apps/{app_id}/regenerate-email/:
    post:
      operationId: api_v1_apps_regenerate_email_create
      description: Allocates a new inbound email alias (a brand-new ingestion address)
        for an application owned by the authenticated user. The previous address stops
        working.
      summary: Regenerate inbound email address
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRegenerateEmailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/regenerate-token/:
    post:
      operationId: api_v1_apps_regenerate_token_create
      description: Generates a new server token for an application owned by the authenticated
        user.
      summary: Regenerate application token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationTokenRegenerateResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/revoke-token/:
    post:
      operationId: api_v1_apps_revoke_token_create
      description: Revokes the current application token.
      summary: Revoke application token
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationRevokeTokenResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/templates/:
    get:
      operationId: api_v1_apps_templates_list
      description: Returns the notification templates for an application owned by
        the authenticated user.
      summary: List notification templates
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationTemplateReadList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
    post:
      operationId: api_v1_apps_templates_create
      description: Creates a notification template for an application. Use `{{variable_name}}`
        placeholders in title_template and message_template. These will be replaced
        by the variables dict when creating a notification from the template.
      summary: Create a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWriteRequest'
            examples:
              WelcomeTemplate:
                value:
                  name: welcome
                  title_template: Welcome {{username}}
                  message_template: Hello {{username}}, welcome to {{app_name}}!
                summary: Welcome template
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationTemplateWriteRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Application not found
  /api/v1/apps/{app_id}/templates/{template_id}/:
    get:
      operationId: api_v1_apps_templates_retrieve
      description: Returns the detail of a notification template.
      summary: Notification template detail
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
    patch:
      operationId: api_v1_apps_templates_partial_update
      description: Updates an existing notification template.
      summary: Update a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNotificationTemplateWriteRequest'
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateValidationErrorResponse'
          description: Invalid data
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
    delete:
      operationId: api_v1_apps_templates_destroy
      description: Deletes a notification template.
      summary: Delete a notification template
      parameters:
      - in: path
        name: app_id
        schema:
          type: integer
        required: true
      - in: path
        name: template_id
        schema:
          type: integer
        required: true
      tags:
      - Notification Templates
      security:
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Template not found
  /api/v1/auth/email/confirm/:
    post:
      operationId: api_v1_auth_email_confirm_create
      description: Confirms the account from the uid + token in the emailed link,
        then returns JWT tokens (auto-login). Idempotent for an already-confirmed
        user.
      summary: Confirm an email address
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailConfirmRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailConfirmValidationErrorResponse'
          description: Invalid/expired confirmation link
  /api/v1/auth/email/resend/:
    post:
      operationId: api_v1_auth_email_resend_create
      description: Re-sends the confirmation link if the email matches an unconfirmed
        active account. Always returns 200 with the same body (anti-leak).
      summary: Resend the confirmation email
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailResendRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailResendValidationErrorResponse'
          description: Invalid data
  /api/v1/auth/forgot-password/:
    post:
      operationId: api_v1_auth_forgot_password_create
      description: Sends a password-reset link to the email if it matches an active
        account. Always returns 200 with the same body (anti-leak), whether or not
        the email exists.
      summary: Request a password reset
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: Authenticates a user and returns JWT tokens.
      summary: User login
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginValidationErrorResponse'
          description: Invalid credentials or invalid data
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      description: Blacklists the current refresh token.
      summary: Logout
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
