                value:
                  application_id: 12
                  device_ids:
                  - 4
                  - 5
                  title: Flash promo
                  message: Available now.
                summary: Immediate notification
              ScheduledNotification:
                value:
                  application_id: 12
                  device_ids:
                  - 4
                  - 5
                  title: Evening reminder
                  message: Opens at 8pm.
                  scheduled_for: '2026-03-27T20:00:00+01:00'
                summary: Scheduled notification
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
        required: true
      security:
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
              examples:
                ScheduledNotificationDeferredByQuietPeriod:
                  value:
                    id: 42
                    application_id: 12
                    application_name: Demo Push App
                    device_ids:
                    - 4
                    - 5
                    title: Evening reminder
                    message: Opens at 8pm.
                    status: scheduled
                    created_at: '2026-03-27T10:00:00Z'
                    scheduled_for: '2026-03-27T22:30:00Z'
                    effective_scheduled_for: '2026-03-28T08:00:00Z'
                    sent_at: null
                  summary: Scheduled notification deferred by quiet period
          description: Notification created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCreateValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      scheduled_for:
                      - Scheduled date must be in the future.
                  summary: Validation error
          description: Invalid data
