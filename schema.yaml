                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening offer
                        message: Available from 7pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T19:00:00Z'
                        effective_scheduled_for: '2026-03-27T22:00:00Z'
                        sent_at: null
                  summary: Notifications shifted by quiet period
                NotificationsOrderedByEffectiveScheduleDesc:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - - id: 43
                        application_id: 12
                        application_name: Demo Push App
                        title: Late offer
                        message: Available later tonight.
                        status: scheduled
                        created_at: '2026-03-27T10:05:00Z'
                        scheduled_for: '2026-03-27T21:30:00Z'
                        effective_scheduled_for: '2026-03-27T23:00:00Z'
                        sent_at: null
                      - id: 42
                        application_id: 12
                        application_name: Demo Push App
                        title: Evening offer
                        message: Available from 7pm.
                        status: scheduled
                        created_at: '2026-03-27T10:00:00Z'
                        scheduled_for: '2026-03-27T19:00:00Z'
                        effective_scheduled_for: '2026-03-27T22:00:00Z'
                        sent_at: null
                  summary: Notifications ordered by effective schedule desc
          description: Application notification list
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationFutureFilterValidationErrorResponse'
          description: Invalid filters
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid or missing app token
        '403':
