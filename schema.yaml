          type: string
        description: Required idempotency key to deduplicate creations on the application
          side.
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
            examples:
              ScheduledApp-tokenNotification:
                value:
                  title: Evening offer
                  message: Available from 7pm.
                  scheduled_for: '2026-03-27T19:00:00+01:00'
                summary: Scheduled app-token notification
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
      security:
      - AppTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
              examples:
                ExistingScheduledNotificationDeferredByQuietPeriod:
                  value:
                    id: 42
                    application_id: 12
                    application_name: Demo Push App
                    title: Evening offer
                    message: Available from 7pm.
                    status: scheduled
                    created_at: '2026-03-27T10:00:00Z'
                    scheduled_for: '2026-03-27T19:00:00Z'
                    effective_scheduled_for: '2026-03-27T22:00:00Z'
                    sent_at: null
                  summary: Existing scheduled notification deferred by quiet period
          description: Existing notification returned via idempotency
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
              examples:
                CreatedScheduledNotificationDeferredByQuietPeriod:
                  value:
                    id: 42
                    application_id: 12
                    application_name: Demo Push App
                    title: Evening offer
                    message: Available from 7pm.
                    status: scheduled
                    created_at: '2026-03-27T10:00:00Z'
                    scheduled_for: '2026-03-27T19:00:00Z'
                    effective_scheduled_for: '2026-03-27T22:00:00Z'
                    sent_at: null
                  summary: Created scheduled notification deferred by quiet period
          description: Notification created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCreateWithAppTokenValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    code: validation_error
                    detail: Validation error.
                    errors:
                      scheduled_for:
                      - Scheduled date must be in the future.
                  summary: Validation error
          description: Invalid data
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid or missing app token
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Access denied
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                IdempotencyConflict:
                  value:
                    code: idempotency_conflict
                    detail: This idempotency key has already been used with a different
                      payload.
                  summary: Idempotency conflict
          description: Idempotency key already used with a different payload
  /api/v1/notifications/app/send/:
    post:
      operationId: api_v1_notifications_app_send_create
      description: Creates a notification for the application authenticated via `X-App-Token`
        and dispatches it right away to the application's linked devices. One-call
        alternative to /app/create/ followed by /app/bulk-send/. The `Idempotency-Key`
        header is required; replaying it returns the existing notification (200) without
        re-sending. To schedule, use /app/create/ with `scheduled_for` instead (this
        endpoint rejects it).
