  /api/v1/notifications/app/:
    get:
      operationId: api_v1_notifications_app_list
      description: Returns the list of notifications for the application authenticated
        via the `X-App-Token` header. Filters `effective_scheduled_from` / `effective_scheduled_to`
        apply to `effective_scheduled_for`. Filters `status` and `has_quiet_period_shift`
        are also available. The `ordering` parameter allows sorting by effective send
        date.
      summary: List notifications via app token
      parameters:
      - in: query
        name: effective_scheduled_from
        schema:
          type: string
          format: date-time
        description: Inclusive filter on minimum effective send date.
      - in: query
        name: effective_scheduled_to
        schema:
          type: string
          format: date-time
        description: Inclusive filter on maximum effective send date.
      - in: query
        name: has_quiet_period_shift
        schema:
          type: boolean
        description: Only return notifications whose effective date is shifted by
          a quiet period.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -effective_scheduled_for
          - effective_scheduled_for
        description: Optional ordering by effective send date.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - draft
          - failed
          - no_target
          - partial
          - processing
          - queued
          - scheduled
          - sent
        description: Filter by notification status.
      tags:
      - Notifications
      security:
