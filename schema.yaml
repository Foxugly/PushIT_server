      description: Creates a new notification for an application owned by the authenticated
        user and an explicit list of target devices. If `scheduled_for` is provided,
        the notification is created with `scheduled` status and will be dispatched
        automatically later. `scheduled_for` represents the requested date. `effective_scheduled_for`
