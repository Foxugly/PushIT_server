          type: string
        description: Required idempotency key to deduplicate sends on the application
          side.
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationCreateWithAppTokenRequest'
      security:
      - AppTokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
          description: Notification created and queued
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRead'
          description: Existing notification returned via idempotency
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCreateWithAppTokenValidationErrorResponse'
          description: Invalid data (or scheduled_for supplied — schedule via /app/create/)
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid or missing app token
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Idempotency key reused with a different payload
